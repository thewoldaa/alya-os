# Build Alya OS ISO
# -------------------------------------------------------------------
# Purpose:    Full Alya OS ISO build using the official build.sh
#             pipeline (9 stages). Produces a bootable ISO with all
#             Alya overlays, branding, patches, and custom packages.
#
# Trigger:    Push to main/develop (path-scoped) or manual dispatch.
#             Release builds are handled by release.yml (tag-triggered).
#
# Prerequisites (CI env):
#   - archlinux:base-devel container with --privileged
#   - sudo and build-user (makepkg cannot run as root)
#   - CachyOS GPG key pre-populated in overlay/airootfs
#     (mkarchiso passes -G to pacstrap, blocking host keyring copy)
#   - USER exported (build.sh post-mkarchiso chown step)

name: Build Alya OS ISO

on:
  workflow_dispatch:
  push:
    branches: [ main, develop ]
    paths:
      - 'build.sh'
      - 'overlay/**'
      - 'packages/**'
      - 'packages-alya.x86_64'
      - 'patches/**'
      - 'assets/**'
      - '.github/workflows/build.yml'
  pull_request:
    paths:
      - 'build.sh'
      - 'overlay/**'
      - 'packages/**'
      - 'packages-alya.x86_64'
      - 'patches/**'
      - 'assets/**'

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
      options: --privileged

    env:
      BUILD_USER: build

    steps:
      # ── Step 1: Install git (archlinux:base-devel may not include it) ──
      # actions/checkout falls back to REST API download if git is missing,
      # which does NOT support submodules. Install git first so checkout
      # can create a proper local repository with submodule support.
      - name: Install git
        run: pacman -Syu --noconfirm git

      # ── Step 2: Checkout with submodules ──
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          submodules: recursive

      # ── Step 3: Initialize pacman (required in fresh container) ──
      - name: Initialize pacman keyring
        run: |
          pacman-key --init
          pacman-key --populate archlinux

      # ── Step 4: Install build dependencies ──
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed \
            archiso \
            mkinitcpio-archiso \
            squashfs-tools \
            xorriso \
            grub \
            syslinux \
            sudo \
            base-devel \
            git

          # Add CachyOS repo and install keyring (host-side)
          printf '%s\n' '' '[cachyos]' \
            'Server = https://mirror.cachyos.org/repo/$arch/$repo' \
            'SigLevel = Optional TrustAll' >> /etc/pacman.conf
          pacman -Syu --noconfirm cachyos-keyring

      # ── Step 5: Create build user (makepkg refuses to run as root) ──
      - name: Create build user
        run: |
          useradd -m -G wheel "${BUILD_USER}"
          # Passwordless sudo for mkarchiso (build.sh Stage 8)
          printf '%s ALL=(ALL) NOPASSWD: ALL\n' "${BUILD_USER}" >> /etc/sudoers
          # makepkg needs write access to build output
          chown -R "${BUILD_USER}:" "${GITHUB_WORKSPACE}"

      # ── Step 6: Pre-populate CachyOS GPG keyring in overlay ──
      # mkarchiso calls pacstrap with -G (no host keyring copy).
      # We inject the key into overlay/airootfs so build.sh copies it
      # into the chroot before pacstrap runs.
      - name: Pre-populate CachyOS keyring in overlay
        run: |
          mkdir -p overlay/airootfs/etc/pacman.d/gnupg
          cp -a --no-preserve=ownership /etc/pacman.d/gnupg/. \
            overlay/airootfs/etc/pacman.d/gnupg/

      # ── Step 7: Initialize submodule (build.sh expects pinned commit) ──
      # Step 5 chowns the workspace to BUILD_USER; steps run as root.
      # Git 2.35+ treats each submodule repo separately and blocks
      # dubious ownership — add exceptions for workspace + submodules.
      - name: Initialize upstream submodule
        run: |
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"
          git config --global --add safe.directory "${GITHUB_WORKSPACE}/upstream"
          git submodule update --init --recursive
          git -C upstream checkout 33bbc02

      # ── Step 8: Record pre-build metrics ──
      - name: Record start metrics
        run: |
          echo "START_TS=$(date +%s)" >> "$GITHUB_ENV"
          echo "=== Pre-Build System State ==="
          free -h
          df -h /

      # ── Step 9: Build Alya OS ISO ──
      - name: Build Alya OS ISO
        id: build
        working-directory: ${{ github.workspace }}
        run: |
          # build.sh Stage 6 (makepkg) refuses root.
          # build.sh Stage 8 (mkarchiso) needs sudo.
          # The build user has passwordless sudo — both work.
          export USER="${BUILD_USER}"
          chown -R "${BUILD_USER}:" .
          sudo -u "${BUILD_USER}" bash build.sh

      # ── Step 10: Record post-build metrics ──
      - name: Record end metrics
        run: |
          echo "END_TS=$(date +%s)" >> "$GITHUB_ENV"
          echo "=== Post-Build System State ==="
          free -h
          df -h /

      # ── Step 11: Generate build report ──
      - name: Generate build report
        run: |
          ISO_FILE=$(ls out/*.iso 2>/dev/null | head -1)
          if [ -z "${ISO_FILE}" ]; then
            echo "FAIL: No ISO found in out/"
            ls -la out/ 2>/dev/null || echo "out/ does not exist"
            exit 1
          fi
          ISO_NAME=$(basename "${ISO_FILE}")
          ISO_SIZE=$(du -h "${ISO_FILE}" | cut -f1)
          ISO_SIZE_BYTES=$(stat --format=%s "${ISO_FILE}")
          ISO_SHA256=$(sha256sum "${ISO_FILE}" | cut -d' ' -f1)
          BUILD_DURATION=$((END_TS - START_TS))
          BUILD_REPORT="out/build-report.txt"

          if [ -f "${BUILD_REPORT}" ]; then
            echo "=== build.sh Report ==="
            cat "${BUILD_REPORT}"
          fi

          cat > "out/ci-report.txt" << CIEOF
          ╔══════════════════════════════════════════════════╗
          ║           Alya OS CI Build Report                ║
          ╚══════════════════════════════════════════════════╝

          Build Date:     $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          Commit:         ${GITHUB_SHA}
          Ref:            ${GITHUB_REF_NAME}

          Build Duration: $((BUILD_DURATION / 60))m $((BUILD_DURATION % 60))s

          ISO Name:       ${ISO_NAME}
          ISO Size:       ${ISO_SIZE} (${ISO_SIZE_BYTES} bytes)
          ISO SHA256:     ${ISO_SHA256}

          Result:         SUCCESS
          CIEOF

          echo "ISO_NAME=${ISO_NAME}" >> "$GITHUB_ENV"
          echo "ISO_SIZE=${ISO_SIZE}" >> "$GITHUB_ENV"
          echo "ISO_SHA256=${ISO_SHA256}" >> "$GITHUB_ENV"
          echo "BUILD_DURATION=$((BUILD_DURATION / 60))m $((BUILD_DURATION % 60))s" >> "$GITHUB_ENV"

          echo ""
          echo "=== CI Build Report ==="
          cat "out/ci-report.txt"

      # ── Step 12: Upload ISO ──
      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: alya-os-iso-${{ github.sha }}
          path: out/*.iso
          retention-days: 7

      # ── Step 13: Upload build reports ──
      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: alya-os-reports-${{ github.sha }}
          path: out/*-report.txt
          retention-days: 90
