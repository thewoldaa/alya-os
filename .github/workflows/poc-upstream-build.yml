# PoC: Upstream CachyOS ISO Build
# ---------------------------------
# Purpose:    Prove that mkarchiso works inside GitHub Actions.
#             This is the BASELINE for all future Alya OS CI builds.
#
# Builds:     Official unmodified CachyOS Live ISO (commit 33bbc02)
# No Alya:    No overlay, no branding, no custom packages.
#             Alya-specific CI will be added only after this passes.
#
# Rules:
#   - This workflow stays in the repo permanently.
#   - Every upstream update must pass this PoC first.
#   - Never modify build.sh for CI — keep it CI-agnostic.
#
# Measurements recorded:
#   Build duration, peak disk, peak RAM, ISO size, SHA256

name: PoC - Build Upstream CachyOS ISO

on:
  workflow_dispatch:
  push:
    branches: [ main, develop ]
    paths:
      - '.github/workflows/poc-upstream-build.yml'
  pull_request:
    paths:
      - '.github/workflows/poc-upstream-build.yml'

jobs:
  build-upstream:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
      options: --privileged

    steps:
      # ── Step 1: Checkout (present for future Alya integration; unused by PoC) ──
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Step 2: Initialize pacman (required in fresh container) ──
      - name: Initialize pacman keyring
        run: |
          pacman-key --init
          pacman-key --populate archlinux

      # ── Step 3: System update and install build dependencies ──
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed archiso xorriso squashfs-tools grub binutils git

      # ── Step 4: Clone upstream CachyOS at pinned commit ──
      - name: Clone upstream CachyOS
        id: upstream
        run: |
          git clone https://github.com/CachyOS/CachyOS-Live-ISO.git /tmp/upstream
          cd /tmp/upstream
          git checkout 33bbc02
          echo "CACHYOS_COMMIT=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
          echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      # ── Step 5: Record pre-build metrics ──
      - name: Record start metrics
        run: |
          echo "START_TS=$(date +%s)" >> "$GITHUB_ENV"
          echo "START_DISK=$(df -BG / | tail -1 | awk '{print $3}')" >> "$GITHUB_ENV"
          echo "=== Pre-Build System State ==="
          free -h
          echo "---"
          df -h /

      # ── Step 6: Build upstream CachyOS ISO ──
      - name: Build upstream CachyOS ISO
        id: build
        run: |
          mkarchiso -v -w /tmp/work -o /tmp/out /tmp/upstream/archiso

      # ── Step 7: Record post-build metrics ──
      - name: Record end metrics
        run: |
          echo "END_TS=$(date +%s)" >> "$GITHUB_ENV"
          echo "END_DISK=$(df -BG / | tail -1 | awk '{print $3}')" >> "$GITHUB_ENV"
          echo "=== Post-Build System State ==="
          free -h
          echo "---"
          df -h /

      # ── Step 8: Measure ISO and generate PoC report ──
      - name: Measure ISO and generate report
        run: |
          ISO_FILE=$(ls /tmp/out/*.iso | head -1)
          ISO_NAME=$(basename "$ISO_FILE")
          ISO_SIZE=$(du -h "$ISO_FILE" | cut -f1)
          ISO_SIZE_BYTES=$(stat --format=%s "$ISO_FILE")
          ISO_SHA256=$(sha256sum "$ISO_FILE" | cut -d' ' -f1)
          BUILD_DURATION=$((END_TS - START_TS))

          cat > /tmp/out/poc-report.txt << POCEOF
          ╔══════════════════════════════════════════════════╗
          ║      CachyOS Upstream PoC Build Report          ║
          ╚══════════════════════════════════════════════════╝

          Build Date:     $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          CachyOS Commit: ${CACHYOS_COMMIT}

          Build Duration: $((BUILD_DURATION / 60))m $((BUILD_DURATION % 60))s
          Peak RAM:       $(free -h | grep Mem | awk '{print $3}')
          Start Disk:     ${START_DISK}
          End Disk:       ${END_DISK}
          Peak Disk Used: ${START_DISK} → ${END_DISK}

          ISO Name:       ${ISO_NAME}
          ISO Size:       ${ISO_SIZE} (${ISO_SIZE_BYTES} bytes)
          ISO SHA256:     ${ISO_SHA256}

          Result:         SUCCESS
          POCEOF

          # Export for artifact upload
          echo "ISO_NAME=${ISO_NAME}" >> "$GITHUB_ENV"
          echo "ISO_SIZE=${ISO_SIZE}" >> "$GITHUB_ENV"
          echo "ISO_SHA256=${ISO_SHA256}" >> "$GITHUB_ENV"
          echo "BUILD_DURATION=$((BUILD_DURATION / 60))m $((BUILD_DURATION % 60))s" >> "$GITHUB_ENV"

          echo ""
          echo "=== PoC Build Report ==="
          cat /tmp/out/poc-report.txt

      # ── Step 9: Upload ISO (artifact expires in 7 days) ──
      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: cachyos-upstream-iso-${{ steps.upstream.outputs.commit }}
          path: /tmp/out/*.iso
          retention-days: 7

      # ── Step 10: Upload PoC report ──
      - name: Upload PoC report
        uses: actions/upload-artifact@v4
        with:
          name: poc-report-${{ steps.upstream.outputs.commit }}
          path: /tmp/out/poc-report.txt
          retention-days: 90
