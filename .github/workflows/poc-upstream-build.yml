# PoC: Build Upstream CachyOS ISO via Official Build Entry Point
# ----------------------------------------------------------------
# Purpose:    Prove that the unmodified CachyOS build process
#             (buildiso.sh → run_build → mkarchiso) completes
#             successfully inside GitHub Actions.
#
#             This is the BASELINE for all future Alya OS CI builds.
#             Alya-specific CI will be added only after this passes.
#
# Invocation: bash buildiso.sh -p desktop -v
#             -p desktop  = CachyOS "desktop" profile (includes KDE Plasma)
#             -v          = verbose mkarchiso output
#
# CI provides ONLY:
#   1. Container environment (archlinux:base-devel, --privileged)
#   2. Dependencies (archiso, sudo, etc.)
#   3. Pinned upstream checkout (commit 33bbc02)
#   4. Metrics recording
#   5. Artifact collection
#
# Upstream provides ALL build logic:
#   - Profile preparation (package list, motd, mirrorlist, version tags)
#   - Work directory management
#   - mkarchiso invocation
#   - Output packaging (checksums, signatures)
#
# Rules:
#   - This workflow stays in the repo permanently.
#   - Every upstream update must pass this PoC first.
#   - Never modify build.sh for CI — keep it CI-agnostic.
#   - Never bypass or replicate upstream build logic in this workflow.
#
# Measurements recorded:
#   Build duration, peak disk, peak RAM, ISO size, SHA256

name: PoC - Build Upstream CachyOS ISO

on:
  workflow_dispatch:
  push:
    branches: [ main, develop ]
    paths:
      - '.github/workflows/poc-upstream-build.yml'
  pull_request:
    paths:
      - '.github/workflows/poc-upstream-build.yml'

jobs:
  build-upstream:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
      options: --privileged

    env:
      UPSTREAM_DIR: /tmp/upstream
      BUILD_PROFILE: desktop

    steps:
      # ── Step 1: Checkout (present for future Alya integration) ──
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Step 2: Initialize pacman (required in fresh container) ──
      - name: Initialize pacman keyring
        run: |
          pacman-key --init
          pacman-key --populate archlinux

      # ── Step 3: System update and install build dependencies ──
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed \
            archiso \
            mkinitcpio-archiso \
            squashfs-tools \
            grub \
            syslinux \
            sudo \
            git

          # ── Make CachyOS signing key available on the host ──
          # mkarchiso calls pacstrap with -G (no host keyring copy), so we will
          # later pre-populate the profile's airootfs with the CachyOS key.
          # First, install the keyring package on the host. The TrustAll is
          # needed to break the chicken-and-egg: we need the key to verify the
          # keyring package itself.
          printf '%s\n' '' '[cachyos]' \
            'Server = https://mirror.cachyos.org/repo/$arch/$repo' \
            'SigLevel = Optional TrustAll' >> /etc/pacman.conf
          pacman -Syu --noconfirm cachyos-keyring

      # ── Step 4: Clone upstream CachyOS at pinned commit ──
      - name: Clone upstream CachyOS
        id: upstream
        run: |
          git clone https://github.com/CachyOS/CachyOS-Live-ISO.git "${UPSTREAM_DIR}"
          cd "${UPSTREAM_DIR}"
          git checkout 33bbc02
          echo "CACHYOS_COMMIT=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
          echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "URL=https://github.com/CachyOS/CachyOS-Live-ISO" >> "$GITHUB_ENV"

      # ── Step 5: Pre-populate GPG keyring for CachyOS repo verification ──
      # mkarchiso calls pacstrap with -G, which prevents copying the host
      # keyring into the chroot. To work around this, we pre-populate the
      # profile's airootfs with the host keyring (which now includes the
      # CachyOS key). mkarchiso's _make_custom_airootfs() copies this into
      # the chroot before pacstrap runs, making the CachyOS key available
      # when pacman syncs the CachyOS database.
      - name: Pre-populate CachyOS keyring in airootfs
        run: |
          mkdir -p "${UPSTREAM_DIR}/archiso/airootfs/etc/pacman.d/gnupg"
          cp -a --no-preserve=ownership /etc/pacman.d/gnupg/. \
            "${UPSTREAM_DIR}/archiso/airootfs/etc/pacman.d/gnupg/"

      # ── Step 6: Record pre-build metrics ──
      - name: Record start metrics
        run: |
          echo "START_TS=$(date +%s)" >> "$GITHUB_ENV"
          echo "START_DISK=$(df -BG / | tail -1 | awk '{print $3}')" >> "$GITHUB_ENV"
          echo "=== Pre-Build System State ==="
          free -h
          df -h /

      # ── Step 7: Build upstream CachyOS ISO via official entry point ──
      - name: Build upstream CachyOS ISO
        id: build
        working-directory: ${{ env.UPSTREAM_DIR }}
        run: |
          # $USER must be set for buildiso.sh's post-mkarchiso chown step
          export USER="${USER:-root}"
          bash buildiso.sh -p "${BUILD_PROFILE}" -v

      # ── Step 8: Record post-build metrics ──
      - name: Record end metrics
        run: |
          echo "END_TS=$(date +%s)" >> "$GITHUB_ENV"
          echo "END_DISK=$(df -BG / | tail -1 | awk '{print $3}')" >> "$GITHUB_ENV"
          echo "=== Post-Build System State ==="
          free -h
          df -h /

      # ── Step 9: Locate output and generate PoC report ──
      - name: Measure ISO and generate report
        run: |
          OUT_DIR="${UPSTREAM_DIR}/out/${BUILD_PROFILE}"
          ISO_FILE=$(ls "${OUT_DIR}"/*.iso | head -1)
          ISO_NAME=$(basename "$ISO_FILE")
          ISO_SIZE=$(du -h "$ISO_FILE" | cut -f1)
          ISO_SIZE_BYTES=$(stat --format=%s "$ISO_FILE")
          ISO_SHA256=$(sha256sum "$ISO_FILE" | cut -d' ' -f1)
          BUILD_DURATION=$((END_TS - START_TS))

          REPORT="${OUT_DIR}/poc-report.txt"
          cat > "$REPORT" << POCEOF
          ╔══════════════════════════════════════════════════╗
          ║      CachyOS Upstream PoC Build Report          ║
          ╚══════════════════════════════════════════════════╝

          Build Method:   Official buildiso.sh entry point
          Build Profile:  ${BUILD_PROFILE}
          Build Date:     $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          Upstream Repo:  ${URL}
          Upstream Commit: ${CACHYOS_COMMIT}

          Build Duration: $((BUILD_DURATION / 60))m $((BUILD_DURATION % 60))s
          Peak RAM:       $(free -h | grep Mem | awk '{print $3}')
          Start Disk:     ${START_DISK}
          End Disk:       ${END_DISK}
          Peak Disk Used: ${START_DISK} → ${END_DISK}

          ISO Name:       ${ISO_NAME}
          ISO Size:       ${ISO_SIZE} (${ISO_SIZE_BYTES} bytes)
          ISO SHA256:     ${ISO_SHA256}

          Build Log:      See workflow run log

          Result:         SUCCESS
          POCEOF

          # Export for artifact upload
          echo "ISO_NAME=${ISO_NAME}" >> "$GITHUB_ENV"
          echo "ISO_SIZE=${ISO_SIZE}" >> "$GITHUB_ENV"
          echo "ISO_SHA256=${ISO_SHA256}" >> "$GITHUB_ENV"
          echo "BUILD_DURATION=$((BUILD_DURATION / 60))m $((BUILD_DURATION % 60))s" >> "$GITHUB_ENV"

          echo ""
          echo "=== PoC Build Report ==="
          cat "$REPORT"

      # ── Step 10: Upload ISO (artifact expires in 7 days) ──
      - name: Upload ISO
        uses: actions/upload-artifact@v7
        with:
          name: cachyos-upstream-iso-${{ steps.upstream.outputs.commit }}
          path: ${{ env.UPSTREAM_DIR }}/out/${{ env.BUILD_PROFILE }}/*.iso
          retention-days: 7

      # ── Step 11: Upload PoC report ──
      - name: Upload PoC report
        uses: actions/upload-artifact@v7
        with:
          name: poc-report-${{ steps.upstream.outputs.commit }}
          path: ${{ env.UPSTREAM_DIR }}/out/${{ env.BUILD_PROFILE }}/poc-report.txt
          retention-days: 90

      # ── Step 12: Upload build logs ──
      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-logs-${{ steps.upstream.outputs.commit }}
          path: ${{ env.UPSTREAM_DIR }}/build/**/*.log
          retention-days: 90
