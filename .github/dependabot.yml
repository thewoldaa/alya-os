version: 2
updates:
  # Track GitHub Actions versions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - ci
      - dependencies

  # Track CachyOS upstream commit changes
  # Manual tracking: Alya OS pins to a specific upstream commit.
  # Dependabot will notify when actions update but NOT auto-update upstream.
  # Upstream updates require manual verification via PoC workflow.
