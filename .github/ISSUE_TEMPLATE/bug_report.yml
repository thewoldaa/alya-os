name: Bug Report
description: Report a bug in Alya OS
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        ## Bug Report
        Before reporting, verify:
        - This is not an upstream CachyOS issue
        - This is not an Arch Linux package issue
        - You have tested with the latest code

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the bug
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: Exact steps to reproduce
      placeholder: |
        1. Run `./build.sh`
        2. ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - critical (ISO unbootable, component completely broken)
        - major (feature broken, has workaround)
        - minor (cosmetic, non-functional)
    validations:
      required: true

  - type: dropdown
    id: found-during
    attributes:
      label: Found During
      options:
        - Local build
        - CI build (GitHub Actions)
        - UEFI boot test
        - BIOS boot test
        - Live session test
        - Package installation
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - branding
        - boot
        - desktop
        - packaging
        - build
        - ci
    validations:
      required: true

  - type: input
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Attach build logs, boot logs, or screenshots

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Build host OS, Alya version, CachyOS commit
      placeholder: |
        Host OS: Arch Linux
        Alya Version: 0.1.0
        CachyOS Commit: 33bbc02
